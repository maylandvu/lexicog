name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-macos-apple-silicon:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate version metadata matches tag
        run: |
          expected="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          cargo_version="$(grep -m1 '^version = "' src-tauri/Cargo.toml | cut -d'"' -f2)"
          tauri_version="$(node -p "JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json', 'utf8')).version")"
          test "$package_version" = "$expected" || { echo "package.json version $package_version does not match tag $expected"; exit 1; }
          test "$cargo_version" = "$expected" || { echo "Cargo.toml version $cargo_version does not match tag $expected"; exit 1; }
          test "$tauri_version" = "$expected" || { echo "tauri.conf.json version $tauri_version does not match tag $expected"; exit 1; }

      - name: Build and publish macOS release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: LexiCog ${{ github.ref_name }}
          releaseBody: |
            Apple Silicon build plus Tauri updater metadata.

            This macOS app is not Apple-notarized. After installing to /Applications, run:
            sudo xattr -rd com.apple.quarantine /Applications/LexiCog.app
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin
